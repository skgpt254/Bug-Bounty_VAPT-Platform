<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Recon/VAPT{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="scanline"></div>
<header class="topbar">
  <a href="/" class="brand">
    <span class="brand-mark">&gt;_</span> Recon/VAPT
  </a>
  <nav class="topnav">
    <a href="/">Programs</a>
    <a href="/docs" target="_blank" rel="noopener">API</a>
    {% if auth_enabled %}
    <form method="post" action="/logout" style="display:inline;">
      <button type="submit">Sign out</button>
    </form>
    {% endif %}
  </nav>
</header>
<main class="shell">
  {% block content %}{% endblock %}
</main>
<footer class="footer">
  <span>Every active phase is scope-gated — nothing fires outside <code>scope_regex</code>.</span>
</footer>
<div id="toast-region"></div>
<script src="/static/app.js"></script>
</body>
</html>
