{% extends "base.html" %}
{% block title %}Sign in — Recon/VAPT{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="panel auth-card">
    <div class="auth-mark">&gt;_</div>
    <h1 class="auth-title">Sign in</h1>
    <p class="muted" style="margin-top:-6px;">This instance requires a password before it will trigger scans or show results.</p>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required />
      <div class="actions"><button type="submit" style="width:100%;">Continue</button></div>
    </form>
  </div>
</div>
{% endblock %}
